# TypeScript / Next.js — ESLint (lint) + Biome (format)
# Note: mirrors-eslint 与 eslint-config-next 的 rushstack patch 冲突，改用本地 pnpm 环境
repos:
  - repo: local
    hooks:
      - id: eslint
        name: lint
        entry: pnpm exec eslint
        language: system
        files: \.(js|jsx|ts|tsx|mjs)$
        exclude: ^(node_modules|\.next|\.open-next|dist|out)/
        types: [file]
        pass_filenames: true

  - repo: https://github.com/biomejs/pre-commit
    rev: v2.2.0
    hooks:
      - id: biome-check
        name: format
        additional_dependencies: ["@biomejs/biome@2.2.0"]
